<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英雄联盟 Counter位克制建议</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header>
  <div>
    <h1>英雄联盟 Counter 位克制建议</h1>
    <p>输入对方选择的英雄，选择路线，获取 OP.GG 克制英雄推荐与符文配置</p>
  </div>
</header>

<main>

  <!-- Search -->
  <div class="search-wrapper">
    <label class="search-label">选择对方英雄</label>
    <div class="search-input-row">
      <input
        type="text"
        id="champion-search"
        placeholder="搜索英雄名称（中文 / 英文 / 拼音皆可）..."
        autocomplete="off"
      />
      <span class="search-icon">🔍</span>
    </div>
    <div id="search-dropdown" class="hidden"></div>
  </div>

  <!-- Selected champion banner -->
  <div id="selected-banner">
    <img src="" alt="" />
    <div class="info">
      <h3>英雄名</h3>
      <p>称号</p>
    </div>
    <span class="tag">对方选择</span>
  </div>

  <!-- Position selector (shown after champion is selected) -->
  <div id="position-bar" class="position-bar hidden">
    <span class="pos-label">对方路线：</span>
    <div class="pos-buttons">
      <button class="pos-btn active" data-position="">
        <span class="pos-icon">◈</span> 全部
      </button>
      <button class="pos-btn" data-position="top">
        <span class="pos-icon">⚔</span> 上路
      </button>
      <button class="pos-btn" data-position="jungle">
        <span class="pos-icon">🌿</span> 打野
      </button>
      <button class="pos-btn" data-position="mid">
        <span class="pos-icon">💠</span> 中路
      </button>
      <button class="pos-btn" data-position="bottom">
        <span class="pos-icon">🏹</span> 下路
      </button>
      <button class="pos-btn" data-position="support">
        <span class="pos-icon">🛡</span> 辅助
      </button>
    </div>
  </div>

  <!-- Tier selector (shown after champion is selected) -->
  <div id="tier-bar" class="position-bar hidden">
    <span class="pos-label">参考段位：</span>
    <div class="pos-buttons">
      <button class="tier-btn active" data-tier="">全段位</button>
      <button class="tier-btn" data-tier="gold_minus">黄金及以下</button>
      <button class="tier-btn" data-tier="plat_to_emerald">铂金至翡翠</button>
      <button class="tier-btn" data-tier="diamond_plus">钻石及以上</button>
    </div>
  </div>

  <!-- Counter picks -->
  <section id="counters-section">
    <div class="section-title">
      <span id="counters-title">克制英雄推荐</span>
    </div>
    <p style="font-size:0.82rem;color:var(--text-dim);margin-bottom:16px;">
      以下英雄对 <strong id="opponent-name" style="color:var(--gold-light)"></strong>
      <span id="position-desc"></span>
      <span id="tier-desc"></span>
      的对位胜率较低，排名综合胜率与对局数加权，越靠前克制效果越可靠，点击英雄卡片查看符文推荐。
    </p>
    <div id="counters-grid"></div>
  </section>

  <!-- Rune recommendations -->
  <section id="runes-section">
    <div class="section-title">OP.GG 推荐符文配置</div>
    <div class="runes-header">
      <img id="rune-champ-img" src="" alt="" />
      <div>
        <h3 id="rune-champ-name"></h3>
        <p id="rune-position-desc">来源：OP.GG 高胜率符文页</p>
      </div>
      <a id="rune-opgg-link" class="opgg-link" href="#" target="_blank" style="margin-left:auto">
        在 OP.GG 查看 ↗
      </a>
    </div>
    <div id="runes-body"></div>
  </section>

</main>

<script src="/static/js/pinyin.js"></script>
<script src="/static/js/main.js"></script>

</body>
</html>
