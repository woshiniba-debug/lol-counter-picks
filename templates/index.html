<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="一键查询 OP.GG 克制英雄与符文推荐，Counter 位选手必备工具。" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#040d1a" />

  <title>英雄联盟 Counter 位克制建议</title>

  <!-- Preconnect to upstream image CDNs so champion icons download starts
       in parallel with HTML/CSS parsing, not after. -->
  <link rel="preconnect" href="https://ddragon.leagueoflegends.com" crossorigin />
  <link rel="preconnect" href="https://opgg-static.akamaized.net" crossorigin />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header>
  <div>
    <h1>英雄联盟 Counter 位克制建议</h1>
    <p>输入对方选择的英雄，选择路线，获取 OP.GG 克制英雄推荐与符文配置</p>
  </div>
</header>

<main>

  <!-- Search -->
  <div class="search-wrapper">
    <label class="search-label" for="champion-search">选择对方英雄</label>
    <div class="search-input-row">
      <input
        type="text"
        id="champion-search"
        placeholder="搜索英雄名称（中文 / 英文 / 拼音皆可）..."
        autocomplete="off"
        spellcheck="false"
        autocapitalize="off"
        aria-controls="search-dropdown"
        aria-autocomplete="list"
      />
      <span class="search-icon" aria-hidden="true">🔍</span>
      <!-- Visible only while .search-wrapper.is-loading is set (during the
           initial champion-list fetch). CSS handles the cross-fade. -->
      <span class="search-spinner" role="status" aria-label="加载中"></span>
    </div>
    <!-- role="listbox" lets screen readers identify the dropdown as a
         selectable list rather than a generic floating div. -->
    <div id="search-dropdown" class="hidden" role="listbox"></div>
  </div>

  <!-- Selected champion banner -->
  <div id="selected-banner" aria-live="polite">
    <img src="" alt="" />
    <div class="info">
      <h3>英雄名</h3>
      <p>称号</p>
    </div>
    <span class="tag">对方选择</span>
  </div>

  <!-- Position selector (shown after champion is selected) -->
  <div id="position-bar" class="position-bar hidden" role="toolbar" aria-label="路线筛选">
    <span class="pos-label">对方路线：</span>
    <div class="pos-buttons">
      <button type="button" class="pos-btn active" data-position="" aria-pressed="true">
        <span class="pos-icon" aria-hidden="true">◈</span> 全部
      </button>
      <button type="button" class="pos-btn" data-position="top" aria-pressed="false">
        <span class="pos-icon" aria-hidden="true">⚔</span> 上路
      </button>
      <button type="button" class="pos-btn" data-position="jungle" aria-pressed="false">
        <span class="pos-icon" aria-hidden="true">🌿</span> 打野
      </button>
      <button type="button" class="pos-btn" data-position="mid" aria-pressed="false">
        <span class="pos-icon" aria-hidden="true">💠</span> 中路
      </button>
      <button type="button" class="pos-btn" data-position="bottom" aria-pressed="false">
        <span class="pos-icon" aria-hidden="true">🏹</span> 下路
      </button>
      <button type="button" class="pos-btn" data-position="support" aria-pressed="false">
        <span class="pos-icon" aria-hidden="true">🛡</span> 辅助
      </button>
    </div>
  </div>

  <!-- Tier selector (shown after champion is selected) -->
  <div id="tier-bar" class="position-bar hidden" role="toolbar" aria-label="段位筛选">
    <span class="pos-label">参考段位：</span>
    <div class="pos-buttons">
      <button type="button" class="tier-btn active" data-tier="" aria-pressed="true">全段位</button>
      <button type="button" class="tier-btn" data-tier="gold_minus" aria-pressed="false">黄金及以下</button>
      <button type="button" class="tier-btn" data-tier="plat_to_emerald" aria-pressed="false">铂金至翡翠</button>
      <button type="button" class="tier-btn" data-tier="diamond_plus" aria-pressed="false">钻石及以上</button>
    </div>
  </div>

  <!-- Counter picks -->
  <section id="counters-section" aria-live="polite">
    <div class="section-title">
      <span id="counters-title">克制英雄推荐</span>
    </div>
    <p class="counters-subtitle">
      以下英雄对 <strong id="opponent-name"></strong>
      <span id="position-desc"></span>
      <span id="tier-desc"></span>
      的对位胜率较低，排名综合胜率与对局数加权，越靠前克制效果越可靠，点击英雄卡片查看符文推荐。
    </p>
    <div id="counters-grid"></div>
  </section>

  <!-- Rune recommendations -->
  <section id="runes-section" aria-live="polite">
    <div class="section-title">OP.GG 推荐符文配置</div>
    <div class="runes-header">
      <img id="rune-champ-img" src="" alt="" />
      <div>
        <h3 id="rune-champ-name"></h3>
        <p id="rune-position-desc">来源：OP.GG 高胜率符文页</p>
      </div>
      <a id="rune-opgg-link" class="opgg-link" href="#" target="_blank" rel="noopener"
         style="margin-left:auto">
        在 OP.GG 查看 ↗
      </a>
    </div>
    <div id="runes-body"></div>
  </section>

</main>

<!-- defer keeps script execution after HTML parse, lets main.js use
     `getElementById` directly without DOMContentLoaded gymnastics, and
     preserves order so PinyinSearch is defined before main.js runs. -->
<script src="/static/js/pinyin.js" defer></script>
<script src="/static/js/main.js" defer></script>

</body>
</html>
